# Set sensible TERM
set-option -g default-terminal "tmux-256color"

# Add override for true color support under "color" terminals
set-option -ga terminal-overrides ",*-256color:Tc"

# Start window numbers at 1 to match keyboard order with tmux window order
set-option -g base-index 1

# Renumber windows sequentially after closing any of them
set-option -g renumber-windows on

# Enable windows titles
set-option -g set-titles on
set-option -g set-titles-string '#T'

# Better support for modern options and iterm2 integrated mode
set-option -g extended-keys on
set-option -g focus-events on
set-option -g allow-passthrough on
set-option -g mouse on

# Solarized 256 color theme
source-file "$DOTFILES/tmux/tmux-colors-solarized.conf"

# Fancy status bar
set-option -g status-left "#H "
set-option -g status-left-length 20
# Inline prefix/copy/sync mode indicator (replaces tmux-prefix-highlight plugin)
set-option -g status-right "#{?client_prefix,#[fg=colour231,bg=colour04] ^B ,#{?pane_in_mode,#[default,fg=black,bg=yellow] Copy ,#{?synchronize-panes,#[default,fg=black,bg=green] Sync ,}}}#[default] [%Z] %d.%m.%Y#(uptime)"
set-option -g status-right-length 100
